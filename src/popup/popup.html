<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <!-- extension の popup は MV3 既定で厳格 CSP が適用されるが、意図を明示するため宣言 -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <h1 class="app-title">🛡️ WEB制限解除サポート</h1>
    <p class="app-desc">ページ制限を解除するシンプルな拡張機能</p>

    <label class="main-toggle" id="mainToggle">
      <div class="toggle-info">
        <span class="toggle-icon">⚡</span>
        <span class="toggle-label">制限解除</span>
      </div>
      <div class="toggle-switch">
        <input type="checkbox" id="enabledToggle" />
        <span class="toggle-slider"></span>
      </div>
    </label>

    <label class="main-toggle" id="keepAliveToggleRow">
      <div class="toggle-info">
        <span class="toggle-icon">🔄</span>
        <span class="toggle-label">セッション維持</span>
      </div>
      <div class="toggle-switch">
        <input type="checkbox" id="keepAliveToggle" />
        <span class="toggle-slider"></span>
      </div>
    </label>

    <!-- min / max / value は popup.js が KeepAlive 定数から動的に設定する（actions.js の単一情報源を守るため） -->
    <div class="interval-row hidden" id="intervalRow">
      <div class="interval-header">
        <span class="interval-label">ポーリング間隔</span>
        <span class="interval-value" id="intervalValue"></span>
      </div>
      <input type="range" id="intervalSlider" class="interval-slider" step="1" />
    </div>

    <section class="description">
      <h2 class="section-title">自動で解除</h2>
      <ul class="feature-list">
        <li><span class="feat-icon">🖱️</span>右クリック制限</li>
        <li><span class="feat-icon">✏️</span>テキスト選択制限</li>
      </ul>

      <h2 class="section-title">右クリックメニューから実行</h2>
      <ul class="feature-list">
        <li><span class="feat-icon">📋</span>強制ペースト（入力欄で右クリック）</li>
        <li><span class="feat-icon">✂️</span>強制コピー（テキスト選択中に右クリック）</li>
      </ul>

      <h2 class="section-title">セッション維持</h2>
      <ul class="feature-list">
        <li><span class="feat-icon">💤</span>アイドル検知をリセット（合成イベント）</li>
        <li><span class="feat-icon">🌐</span>SharePoint は同一オリジン ping も追加</li>
      </ul>
    </section>

    <p class="status" id="statusMsg"></p>
  </div>
  <script src="../lib/actions.js"></script>
  <script src="popup.js"></script>
</body>
</html>
