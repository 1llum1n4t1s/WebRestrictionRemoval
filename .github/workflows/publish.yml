name: Publish to Chrome Web Store

on:
  push:
    branches:
      - 'release/**'

permissions:
  contents: read

jobs:
  publish:
    name: Chrome Web Store 公開
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v5

      - name: バージョンを取得
        id: version
        run: |
          version=$(grep -oP '(?<="version": ")[^"]+' manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "📦 公開対象バージョン: $version"

      - name: ブランチ名とバージョンの整合性を確認
        env:
          BRANCH_VERSION: ${{ github.ref_name }}
          MANIFEST_VERSION: ${{ steps.version.outputs.version }}
        run: |
          expected="release/${MANIFEST_VERSION}"
          if [ "$BRANCH_VERSION" != "$expected" ]; then
            echo "::error::ブランチ名 ($BRANCH_VERSION) と manifest.json のバージョン ($MANIFEST_VERSION) が一致しません。期待値: $expected"
            exit 1
          fi
          echo "✅ ブランチ名と manifest バージョン一致: $expected"

      - name: Node セットアップ
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: 依存インストール
        run: npm ci || npm install

      - name: アイコン生成
        run: node scripts/generate-icons.js

      - name: zip パッケージを作成
        run: |
          zip -r web-restriction-remover.zip manifest.json icons src \
            -x "*.DS_Store" "*.swp" "*~"
          ls -lh web-restriction-remover.zip

      - name: Chrome Web Store にアップロード & 公開
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          set +e
          output=$(npx --yes chrome-webstore-upload-cli@3 upload \
            --source web-restriction-remover.zip \
            --extension-id "$CWS_EXTENSION_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN" \
            --auto-publish 2>&1)
          exit_code=$?
          echo "$output"
          if [ $exit_code -eq 0 ]; then
            echo "🎉 Chrome Web Store への公開リクエストを送信したよ〜"
            exit 0
          fi
          # アップロードは成功したが auto-publish 条件を満たさないケースを warning 化。
          # 代表例: Developer Dashboard の "Privacy practices" 未入力 (400 Bad Request)。
          # ZIP は Draft として登録済みのため、Dashboard で手動公開すれば良い。
          if echo "$output" | grep -qE "Publish condition not met|Privacy practices|mandatory privacy information"; then
            echo "::warning::アップロードは成功したけど自動公開できなかったよ💦 Developer Dashboard の Privacy practices タブを埋めてから手動で公開してね (次回以降は auto-publish が通るよ)"
            exit 0
          fi
          # それ以外の失敗は従来通り fail にする
          exit $exit_code
