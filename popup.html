<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <h1 class="app-title">WEB制限解除サポート</h1>
    <p class="app-desc">ページの制限を解除します</p>

    <div class="toggle-list">
      <label class="toggle-item" data-feature="rightClick">
        <div class="toggle-info">
          <span class="toggle-icon">🖱️</span>
          <span class="toggle-label">右クリック制限解除</span>
        </div>
        <div class="toggle-switch">
          <input type="checkbox" />
          <span class="toggle-slider"></span>
        </div>
      </label>

      <label class="toggle-item" data-feature="paste">
        <div class="toggle-info">
          <span class="toggle-icon">📋</span>
          <span class="toggle-label">ペースト制限解除</span>
        </div>
        <div class="toggle-switch">
          <input type="checkbox" />
          <span class="toggle-slider"></span>
        </div>
      </label>

      <label class="toggle-item" data-feature="copy">
        <div class="toggle-info">
          <span class="toggle-icon">📝</span>
          <span class="toggle-label">コピー制限解除</span>
        </div>
        <div class="toggle-switch">
          <input type="checkbox" />
          <span class="toggle-slider"></span>
        </div>
      </label>

      <label class="toggle-item" data-feature="textSelect">
        <div class="toggle-info">
          <span class="toggle-icon">✏️</span>
          <span class="toggle-label">テキスト選択制限解除</span>
        </div>
        <div class="toggle-switch">
          <input type="checkbox" />
          <span class="toggle-slider"></span>
        </div>
      </label>

    </div>

    <div class="action-buttons">
      <button type="button" id="applyBtn" class="btn-primary">
        適用
      </button>
      <button type="button" id="allOnBtn" class="btn-secondary" title="すべてON">
        全ON
      </button>
      <button type="button" id="allOffBtn" class="btn-secondary" title="すべてOFF">
        全OFF
      </button>
    </div>
  </div>
  <script src="scripts/actions.js"></script>
  <script src="popup.js"></script>
</body>
</html>
