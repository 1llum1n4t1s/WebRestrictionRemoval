<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Screenshot 2 - Features</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1280px; height: 800px;
      background: linear-gradient(135deg, #fdf2f2 0%, #f5c6c6 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    .container { text-align: center; }
    h1 {
      font-size: 40px; font-weight: 800; color: #A8524D;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 18px; color: #777; margin-bottom: 48px;
    }
    .features {
      display: flex; gap: 24px; justify-content: center; flex-wrap: wrap;
    }
    .card {
      background: #fff; border-radius: 16px; padding: 32px 24px;
      width: 200px; box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      text-align: center;
    }
    .card .icon { font-size: 40px; margin-bottom: 12px; }
    .card .name { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 6px; }
    .card .desc { font-size: 12px; color: #888; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="container">
    <h1>10の制限解除機能</h1>
    <p class="subtitle">ページの様々な制限をトグル一つで解除</p>
    <div class="features">
      <div class="card">
        <div class="icon">🖱️</div>
        <div class="name">右クリック</div>
        <div class="desc">コンテキストメニューの制限を解除</div>
      </div>
      <div class="card">
        <div class="icon">📋</div>
        <div class="name">ペースト</div>
        <div class="desc">Ctrl+V / 右クリックペーストの制限を解除</div>
      </div>
      <div class="card">
        <div class="icon">📝</div>
        <div class="name">コピー</div>
        <div class="desc">Ctrl+C のコピー制限を解除</div>
      </div>
      <div class="card">
        <div class="icon">✏️</div>
        <div class="name">テキスト選択</div>
        <div class="desc">文字の選択・ドラッグ制限を解除</div>
      </div>
      <div class="card">
        <div class="icon">🖨️</div>
        <div class="name">印刷</div>
        <div class="desc">印刷ブロックを解除</div>
      </div>
      <div class="card">
        <div class="icon">🖐️</div>
        <div class="name">ドラッグ</div>
        <div class="desc">画像・テキストのドラッグ制限を解除</div>
      </div>
      <div class="card">
        <div class="icon">⌨️</div>
        <div class="name">キーボード</div>
        <div class="desc">ショートカットキーの奪取を防止</div>
      </div>
      <div class="card">
        <div class="icon">🖼️</div>
        <div class="name">画像保存</div>
        <div class="desc">透明オーバーレイを除去して画像を保存可能に</div>
      </div>
      <div class="card">
        <div class="icon">🚫</div>
        <div class="name">オーバーレイ除去</div>
        <div class="desc">モーダル・ペイウォールを除去</div>
      </div>
      <div class="card">
        <div class="icon">🔄</div>
        <div class="name">カーソル</div>
        <div class="desc">変更されたカーソルを標準に戻す</div>
      </div>
    </div>
  </div>
</body>
</html>
